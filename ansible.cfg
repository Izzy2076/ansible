[defaults]
inventory = ./inventory/production.ini
remote_user = root
host_key_checking = False
private_key_file = ~/.ssh/id_rsa_ansible_lab
# Permet à Ansible de chercher d'abord dans ton projet, puis dans ton dossier utilisateur
collections_path = ./ansible_collections:~/.ansible/collections:/usr/share/ansible/collections
vault_password_file = .vault_pass

# (Garde le reste de tes configurations en dessous, comme inventory, remote_user, etc.)
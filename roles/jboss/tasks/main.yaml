---
- name: "Installation des prérequis (Java OpenJDK et wget)"
  apt:
    name: 
      - openjdk-17-jdk
      - wget
    state: present
    update_cache: yes
  tags: [jboss, install]

- name: "Création du groupe jboss"
  group:
    name: jboss
    state: present
  tags: [jboss, system]

- name: "Création de l'utilisateur jboss"
  user:
    name: jboss
    group: jboss
    home: /opt/jboss
    shell: /bin/false
  tags: [jboss, system]

# --- AJOUT : Téléchargement et extraction de JBoss (WildFly) ---
- name: "Téléchargement de JBoss / WildFly"
  get_url:
    url: "https://github.com/wildfly/wildfly/releases/download/31.0.1.Final/wildfly-31.0.1.Final.tar.gz" # Version stable à jour
    dest: /tmp/wildfly.tar.gz
    mode: '0644'
  tags: [jboss, download]

- name: "Création du répertoire /opt/jboss s'il n'existe pas"
  file:
    path: /opt/jboss
    state: directory
    owner: jboss
    group: jboss
    mode: '0755'
  tags: [jboss, download]

- name: "Extraction de JBoss"
  unarchive:
    src: /tmp/wildfly.tar.gz
    dest: /opt/jboss
    remote_src: yes
    extra_opts: [--strip-components=1] # Permet de ne pas avoir de sous-dossier avec le numéro de version
    owner: jboss
    group: jboss
    creates: /opt/jboss/standalone/configuration # Ne s'exécute pas si le dossier existe déjà
  tags: [jboss, download]
# ----------------------------------------------------------------

# ... (garder le début avec le téléchargement, l'extraction et le standalone.xml)

- name: "Déploiement de la configuration standalone.xml"
  template:
    src: standalone.xml.j2
    dest: /opt/jboss/standalone/configuration/standalone.xml
    owner: jboss
    group: jboss
    mode: '0640'
  notify: restart jboss
  tags: [jboss, config]

# --- AJOUT : Configuration du service Systemd ---
- name: "Création du fichier d'unité systemd pour JBoss"
  template:
    src: jboss.service.j2
    dest: /etc/systemd/system/jboss.service
    owner: root
    group: root
    mode: '0644'
  register: jboss_service_updated
  tags: [jboss, service]

- name: "Rechargement de systemd si le fichier de service a changé"
  systemd:
    daemon_reload: yes
  when: jboss_service_updated.changed
  tags: [jboss, service]
# ------------------------------------------------

- name: "Démarrage et activation du service JBoss"
  service:
    name: jboss
    state: started
    enabled: yes
  tags: [jboss, service]
---
- name: "Installation de MariaDB Server"
  apt:
    name: mariadb-server
    state: present
    update_cache: yes
  tags: [mariadb, install]

- name: "Configuration de MariaDB (server.cnf)"
  template:
    src: server.cnf.j2
    dest: /etc/mysql/mariadb.conf.d/50-server.cnf
    owner: root
    group: root
    mode: '0644'
  notify: restart mariadb
  tags: [mariadb, config]

- name: "Démarrage et activation du service MariaDB"
  service:
    name: mariadb
    state: started
    enabled: yes
  tags: [mariadb, service]
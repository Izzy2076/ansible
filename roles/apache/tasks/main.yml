---
- name: "Installation Apache"
  apt:
    name: "{{ apache_package_name }}"
    state: present
    update_cache: yes
  tags: [install]

# --- AJOUT ICI : Activation des modules de proxy indispensables ---
- name: "Activation des modules de Proxy Apache (Requis pour ProxyPass)"
  shell: "a2enmod proxy proxy_http"
  register: proxy_modules_enable
  # Évite de marquer la tâche en "changed" inutilement si c'est déjà actif
  changed_when: "'already enabled' not in proxy_modules_enable.stdout"
  tags: [config]

- name: "Configuration Apache"
  template:
    src: apache2.conf.j2
    dest: /etc/apache2/apache2.conf
  notify: restart apache
  tags: [config]

- name: "Supprimer les configurations par défaut polluantes"
  file:
    path: "/etc/apache2/{{ item }}"
    state: absent
  loop:
    - "sites-enabled/000-default.conf"
    - "conf-enabled/serve-cgi-bin.conf"
  notify: restart apache
  tags: [config]

- name: "S'assurer que le répertoire web existe et appartient à www-data"
  file:
    path: /var/www/html
    state: directory
    mode: '0755'
    owner: www-data
    group: www-data
  tags: [config]

- name: "Forcer la création d'un index.html propre"
  copy:
    content: "<html><body><h1>Site de {{ inventory_hostname }} est en ligne !</h1></body></html>"
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: '0644'
  tags: [config]

# CRITIQUE : Force le redémarrage d'Apache MAINTENANT avant de passer à la suite
- name: "Appliquer les changements immédiatement"
  meta: flush_handlers

- name: "Démarrage et activation du Service"
  service:
    name: "{{ apache_service_name }}"
    state: started
    enabled: yes
  tags: [service]

- name: "Vérifier qu'Apache répond localement"
  uri:
    url: "http://localhost:{{ apache_listen_port }}"
    status_code: [200, 503] # <-- ON ACCEPTE LES DEUX CODES ICI
    timeout: 10
  register: web_test
  retries: 3
  delay: 2
  until: web_test.status in [200, 503]
  tags: [test]